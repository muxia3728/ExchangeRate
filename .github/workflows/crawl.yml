name: 每日汇率采集

on:
  schedule:
    # 北京时间 09:20 = UTC 01:20（周一到周五）
    - cron: '20 1 * * 1-5'
    # 北京时间 18:00 = UTC 10:00（周一到周五）
    - cron: '0 10 * * 1-5'

  # 支持手动触发（测试用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行汇率采集
        run: python src/crawl.py

      - name: 提交结果文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.csv
          git diff --staged --quiet || git commit -m "更新汇率数据 $(date +'%Y-%m-%d %H:%M')"
          git push
