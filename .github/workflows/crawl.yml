name: 每日汇率采集

on:
  # 保留定时作为兜底
  schedule:
    - cron: '40 1 * * 1-5'
    - cron: '50 9 * * 1-5'

  # 支持手动触发
  workflow_dispatch:

  # 支持飞书 API 触发
  repository_dispatch:
    types: [fetch-fx-rate]

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行汇率采集
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python src/crawl.py

      - name: 提交结果文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.csv
          git diff --staged --quiet || git commit -m "更新汇率数据 $(date +'%Y-%m-%d %H:%M')"
          git push
